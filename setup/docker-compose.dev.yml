services:
  angular:
    container_name: Angular
    build:
      context: .
      dockerfile: Dockerfile.dev
    networks:
      - shared_network
    volumes:
      - "../Infernum/:/app"
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development

networks:
  shared_network:
    name: shared_network
    external: true
