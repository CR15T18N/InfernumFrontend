ServerRoot "/usr/local/apache2"

ServerSignature Off
Server Tokens Prod
FileEtag None

# Change the user & Group
User apache-user
Group apache

# Ajust time limit
MaxClients 150
Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5
LimitRequestsFields 100
LimitRequestFieldSize 81900

# Config headers

<IfModule mod_headers.c>
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https://trusted.cdn.com; style-src 'self'"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

</IfModule>


# Módulos necesarios
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule headers_module modules/mod_headers.so
LoadModule setenvif_module modules/mod_setenvif.so

ServerName infernum-original.duckdns.org
DocumentRoot "/usr/local/apache2/htdocs"

# ─── HTTP → redirige todo a HTTPS ────────────────────────────────────────────
<VirtualHost *:80>
    ServerName infernum-original.duckdns.org
    RewriteEngine On
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

# ─── HTTPS ───────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName infernum-original.duckdns.org
    DocumentRoot "/usr/local/apache2/htdocs"

    # SSL
    SSLEngine On
    SSLCertificateFile    /usr/local/apache2/conf/certs/fullchain.pem
    SSLCertificateKeyFile /usr/local/apache2/conf/certs/privkey.pem

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   on

    # Headers de seguridad
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    # ── Proxy API ─────────────────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass /api/ http://backend-infernum-original.duckdns.org:1606/api/
    ProxyPassReverse /api/ http://backend-infernum-original.duckdns.org:1606/api/

    # ── Proxy Admin ───────────────────────────────────────────────────────────
    ProxyPass /admin/ http://backend-infernum-original.duckdns.org:1606/admin/
    ProxyPassReverse /admin/ http://backend-infernum-original.duckdns.org:1606/admin/

    # ── Angular SPA ───────────────────────────────────────────────────────────
    <Directory "/usr/local/apache2/htdocs">
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/admin/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>


# Deny access to private folder
<Directory "/var/www/private"
    Require all denied
</Directory>

<Directory "/"
    Require all denied
</Directory>


# Deny access to sensible files
<Files ~ "^\.(htaccess|htpasswd|env\git\svn)">
    Require all denied
</Files


# Limit the files uploaded
<Directory /var/www/uploads>
    LimitRequestBody 10485760
</Directory>