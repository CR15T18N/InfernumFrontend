ServerSignature Off
ServerTokens Prod
FileEtag None

# Usuario y grupo
User apache-user
Group apache

# Timeouts y límites
Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5
LimitRequestFields 100
LimitRequestFieldSize 81900

# ─── HTTP → redirige todo a HTTPS ────────────────────────────────────────────
<VirtualHost *:80>
    ServerName frontend-infernum-original.duckdns.org
    RewriteEngine On
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

# ─── HTTPS ───────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName frontend-infernum-original.duckdns.org
    DocumentRoot "/var/www/html"

    # SSL
    SSLEngine On
    SSLCertificateFile    /etc/letsencrypt/live/frontend-infernum-original.duckdns.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/frontend-infernum-original.duckdns.org/privkey.pem

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   on

    # Headers de seguridad
     <IfModule mod_headers.c>
        RequestHeader set X-Forwarded-Proto "https"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-hashes' 'sha256-MhtPZXr7+LpJUY5qtMutB+qWfQtMaPccfe7QXtCcEYc=' 'sha256-WhsfDyLP5KqKMesWOxAUuU+Rejkm9qzGFhrxJhR9WCs=' 'sha256-6MgpYh9Kgttf0oGkNQHLh/z8z5eetx6l4/gU2EZE1Uw=' 'sha256-oR04I/S6wc6nndZBEf9AI9+stMxMsuoIYWgu2YILXMQ='; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://assets.codepen.io https://fonts.gstatic.com; connect-src 'self' https://frontend-infernum-original.duckdns.org; img-src 'self' data: https://*.steamstatic.com https://gaming-cdn.com https://placehold.co https://*.pinimg.com; frame-ancestors 'self'"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    </IfModule>

    # ── Proxy API ─────────────────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass        /api/   http://backend-infernum-original.duckdns.org/api/
    ProxyPassReverse /api/   http://backend-infernum-original.duckdns.org/api/

    # ── Proxy Admin ───────────────────────────────────────────────────────────
    ProxyPass        /administratorPanel http://backend-infernum-original.duckdns.org/administratorPanel
    ProxyPassReverse /administratorPanel http://backend-infernum-original.duckdns.org/administratorPanel

    # ── Proxy Livewire ────────────────────────────────────────────────────────
    ProxyPass        /livewire/ http://backend-infernum-original.duckdns.org/livewire/
    ProxyPassReverse /livewire/ http://backend-infernum-original.duckdns.org/livewire/

    # ── Proxy Storage ─────────────────────────────────────────────────────────
    ProxyPass        /storage/ http://backend-infernum-original.duckdns.org/storage/
    ProxyPassReverse /storage/ http://backend-infernum-original.duckdns.org/storage/

    # ── Angular SPA ───────────────────────────────────────────────────────────
    <Directory "/var/www/html">
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/administratorPanel
        RewriteCond %{REQUEST_URI} !^/livewire/
        RewriteCond %{REQUEST_URI} !^/storage/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ─── Restricciones globales ───────────────────────────────────────────────────

<Directory "/">
    Require all denied
</Directory>

<Directory "/var/www/html">
    Require all granted
</Directory>

<Directory "/var/www/private">
    Require all denied
</Directory>

<Directory "/var/www/uploads">
    LimitRequestBody 10485760
</Directory>

<Files ~ "\.(htaccess|htpasswd|env|git|svn)$">
    Require all denied
</Files>
