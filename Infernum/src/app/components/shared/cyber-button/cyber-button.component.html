<button class="cyber-btn" [type]="type" [attr.aria-label]="ariaLabel || label" [disabled]="disabled"
  (click)="onClick()">
  <span class="backdrop">
    <span class="corner"></span>
  </span>
  @if (kbd) {
    <kbd>{{ kbd }}</kbd>
  }
  <app-glitch-text [text]="label" class="btn-text"></app-glitch-text>
</button>
