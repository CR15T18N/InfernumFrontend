<div class="auth-container">
    <div class="modal-static">
        <section class="modal__body">
            <div class="body__backdrop">
                <div class="backdrop">
                    <div class="version">v001.infernum</div>
                    <div class="corner"></div>
                </div>
            </div>
            <div class="body__content">
                <h2>
                    <app-glitch-text text="Infernum - Register"></app-glitch-text>
                </h2>
                <div class="body__text">
                    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" formControlName="username" class="cyber-input"
                                [class.error]="username?.invalid && username?.touched" placeholder="Usuario">
                            <div class="error-message" *ngIf="username?.invalid && username?.touched">
                                <span *ngIf="username?.errors?.['required']">Username is required</span>
                                <span *ngIf="username?.errors?.['minlength']">Minimum 3 characters</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" formControlName="email" class="cyber-input"
                                [class.error]="email?.invalid && email?.touched" placeholder="tu@email.com">
                            <div class="error-message" *ngIf="email?.invalid && email?.touched">
                                <span *ngIf="email?.errors?.['required']">Email is required</span>
                                <span *ngIf="email?.errors?.['email']">Invalid email</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" formControlName="password" class="cyber-input"
                                [class.error]="password?.invalid && password?.touched" placeholder="••••••••">
                            <div class="error-message" *ngIf="password?.invalid && password?.touched">
                                <span *ngIf="password?.errors?.['required']">Password is required</span>
                                <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" formControlName="confirmPassword"
                                class="cyber-input"
                                [class.error]="(confirmPassword?.invalid && confirmPassword?.touched) || passwordMismatch"
                                placeholder="••••••••">
                            <div class="error-message" *ngIf="confirmPassword?.invalid && confirmPassword?.touched">
                                <span *ngIf="confirmPassword?.errors?.['required']">Please confirm your password</span>
                            </div>
                            <div class="error-message" *ngIf="passwordMismatch">
                                Passwords do not match
                            </div>
                        </div>

                        <div class="error-message global" *ngIf="errorMessage">
                            {{ errorMessage }}
                        </div>

                        <div class="modal__actions">
                            <app-cyber-button label="Back" kbd="←" type="button"
                                (clicked)="router.navigate(['/login'])">
                            </app-cyber-button>

                            <app-cyber-button label="Register" kbd="↵" type="submit" [disabled]="isLoading">
                            </app-cyber-button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
