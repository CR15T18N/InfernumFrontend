<app-navbar></app-navbar>

<div class="detail-container">

    <!-- Loading -->
    <div *ngIf="isLoading" class="detail-loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Content -->
    <div *ngIf="!isLoading && game" class="detail-content">

        <!-- Back button -->
        <button class="back-btn" (click)="goBack()">
            <span class="back-arrow">←</span> Back
        </button>

        <!-- Hero section -->
        <div class="hero">
            <div class="cover-wrapper">
                <img [src]="game.coverUrl" [alt]="game.title" class="cover-img"
                    onerror="this.src='https://placehold.co/300x420/131313/00ffff?text=?'">
                <div class="cover-glow"></div>
            </div>

            <div class="hero-info">
                <div class="game-genre-tags">
                    <span class="genre-tag">{{ game.genre }}</span>
                </div>

                <h1 class="game-title">
                    <app-glitch-text [text]="game.title"></app-glitch-text>
                </h1>

                <div class="game-meta">
                    <div class="meta-row">
                        <span class="meta-label">Developer</span>
                        <span class="meta-value">{{ game.developer }}</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Year</span>
                        <span class="meta-value">{{ game.releaseYear }}</span>
                    </div>
                </div>

                <p class="game-description">{{ game.description }}</p>

                <!-- Purchase / Owned section -->
                <div class="purchase-section">
                    <div *ngIf="purchaseMessage" class="purchase-message"
                        [class.success]="purchaseMessageType === 'success'"
                        [class.error]="purchaseMessageType === 'error'">
                        {{ purchaseMessage }}
                    </div>

                    <div class="price-action">
                        <div class="price-display">
                            <span class="price-label">Price</span>
                            <div class="price-values">
                                <!-- Discount badge -->
                                <span *ngIf="hasDiscount(game)" class="detail-discount-badge">
                                    -{{ game.discount }}%
                                </span>
                                <!-- Original price (strikethrough when discounted) -->
                                <span *ngIf="hasDiscount(game)" class="price-original-detail">
                                    {{ formatPrice(game.price) }}
                                </span>
                                <!-- Final price -->
                                <span class="price-value" [class.price-on-sale]="hasDiscount(game)">
                                    {{ finalPrice(game) }}
                                </span>
                            </div>
                        </div>

                        <div class="action-btns">
                            <app-cyber-button *ngIf="!isOwned" [label]="isPurchasing ? 'Processing...' : 'Buy'"
                                [disabled]="isPurchasing" (clicked)="purchase()">
                            </app-cyber-button>

                            <div *ngIf="isOwned" class="owned-badge">
                                <span class="owned-icon">✓</span>
                                <span>In your library</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Not found -->
    <div *ngIf="!isLoading && !game" class="not-found">
        <h2>Game not found</h2>
    </div>

</div>
